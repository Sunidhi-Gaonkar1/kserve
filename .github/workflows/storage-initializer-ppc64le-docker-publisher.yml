name: Storage Intializer ppc64le Docker Publisher

on:
  push:
    # Publish `master` as Docker `latest` image.
    branches:
      - unit-test-storage

    # Publish `v1.2.3` tags as releases.
    tags:
      - v*

env:
  IMAGE_NAME: storage-initializer  

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Run tests.
  # See also https://docs.docker.com/docker-hub/builds/automated-testing/
  test:
    runs-on: self-hosted
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      
      - name: Free-up disk space
        uses: ./.github/actions/free-up-disk-space

      # - name: Setup QEMU
      #   uses: docker/setup-qemu-action@v3
      #   with:
      #     cache-image: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cache-binary: true

      - name: Run tests
        uses: docker/build-push-action@v5
        with:
          platforms: linux/ppc64le
          context: python
          file: python/storage-initializer.Dockerfile
          push: false
          # https://github.com/docker/buildx/issues/1533
          provenance: false

      - name: Set up Python ${{ matrix.python-version }}
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv
        
      - name: Set up virtualenv
        run: |
          uv venv .venv
          # source .venv/bin/activate
          # pip install --upgrade pip
      
      - name: Test kserve Storage
        run: |
          cd python
          source kserve/.venv/bin/activate
          pytest --cov=storage ./storage

  # Push image to GitHub Packages.
  # See also https://docs.docker.com/docker-hub/builds/
  push:
    # Ensure test job passes before pushing image.
    needs: test

    runs-on: self-hosted
    if: github.event_name == 'push'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      
      - name: Free-up disk space
        uses: ./.github/actions/free-up-disk-space

      # - name: Setup QEMU
      #   uses: docker/setup-qemu-action@v3
      #   with:
      #     cache-image: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cache-binary: true

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Export version variable
        run: |
          IMAGE_ID=${{ secrets.DOCKER_USER }}/$IMAGE_NAME

          # Change all uppercase to lowercase
          #IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')

          # Strip git ref prefix from version
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')

          # Strip "v" prefix from tag name
          # [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')

          # Use Docker `latest` tag convention
          [ "$VERSION" == "master" ] && VERSION=latest

          echo VERSION=$VERSION >> $GITHUB_ENV
          echo IMAGE_ID=$IMAGE_ID >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/ppc64le
          context: python
          file: python/storage-initializer.Dockerfile
          push: true
          tags: ${{ env.IMAGE_ID }}:${{ env.VERSION }}
          # https://github.com/docker/buildx/issues/1533
          provenance: false
          sbom: true